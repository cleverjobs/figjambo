<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, system-ui, -apple-system, sans-serif;
      font-size: 12px;
      color: var(--figma-color-text, #333);
      background: var(--figma-color-bg, #fff);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      height: 100vh;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: var(--figma-color-bg-brand, #0d99ff);
      color: #fff;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .progress-bar {
      width: 100%;
      height: 4px;
      background: var(--figma-color-border, #eee);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--figma-color-bg-brand, #0d99ff);
      width: 0%;
      transition: width 0.2s;
    }
    .status { font-size: 11px; color: var(--figma-color-text-secondary, #888); }
    .status.error { color: var(--figma-color-text-danger, #f24822); }
    .status.success { color: var(--figma-color-text-success, #14ae5c); }
    .stats {
      display: flex;
      gap: 16px;
      font-size: 11px;
      color: var(--figma-color-text-secondary, #888);
    }
    .stats span { font-weight: 600; color: var(--figma-color-text, #333); }
  </style>
</head>
<body>
  <button id="extractBtn">Extract Content</button>

  <div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <div class="status" id="status">Ready</div>

  <div class="stats">
    <div>Nodes: <span id="nodeCount">—</span></div>
    <div>Images: <span id="imageCount">—</span></div>
  </div>

  <script src="ui.ts"></script>
</body>
</html>
